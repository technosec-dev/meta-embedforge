# Layer configuration for meta-embedforge
# EmbedForge distribution layer — minimal systemd-based defaults for embedded Linux builds

# Add layer root to BBPATH so BitBake finds conf/distro/embedforge.conf
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "embedforge"
BBFILE_PATTERN_embedforge = "^${LAYERDIR}/"
BBFILE_PRIORITY_embedforge = "6"

# Only depends on openembedded-core (meta layer)
LAYERDEPENDS_embedforge = "core"

# Compatible with all Yocto releases EmbedForge supports.
# Includes EOL releases (nanbield, styhead, walnascar) so customers with
# existing firmwares built on older Yocto versions can still use EmbedForge
# for maintenance and migration.
LAYERSERIES_COMPAT_embedforge = "kirkstone nanbield scarthgap styhead walnascar whinlatter wrynose"
